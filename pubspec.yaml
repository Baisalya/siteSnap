name: surveycam
description: "A camera app for capturing photos with location and geo-tagging features."
publish_to: 'none'

version: 2.0.7+25

environment:
  sdk: '>=3.2.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2

  # Camera & Media
  camera: ^0.12.0+1
  camera_android_camerax: ^0.7.2
  image: ^4.1.7
  path_provider: ^2.1.2
  pdf: ^3.11.3
  photo_view: ^0.15.0
  ffmpeg_kit_flutter_new_https_gpl: ^2.1.0
  vector_graphics: ^1.1.11+1
  path: ^1.9.0

  # Location & Sensors
  geolocator: ^14.0.0
  geocoding: ^4.0.0
  flutter_compass: ^0.8.0

  # State Management
  flutter_riverpod: ^3.3.1

  # Permissions
  permission_handler: ^12.0.0

  # Security & Info
  package_info_plus: ^10.1.0
  safe_device: ^1.1.4

  # Update
  in_app_update: ^4.0.1

  # Storage
  shared_preferences: ^2.2.2

  # UI
  intl: ^0.20.2
  gal: ^2.3.0
  url_launcher: ^6.2.5
  share_plus: ^13.1.0
  sensors_plus: ^7.0.0
  flutter_svg: ^2.2.1
  image_picker: ^1.1.2
  video_player: ^2.8.1
  flutter_video_thumbnail_plus: ^1.0.6
  flutter_foreground_task: ^9.2.2

  uuid: ^4.3.3

  exif: ^3.1.4
  crypto: ^3.0.6

  lottie: ^3.1.2
  google_fonts: ^8.1.0
  camera_platform_interface: ^2.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # App Icon Generator
  flutter_launcher_icons: ^0.14.4

  # Splash Screen Generator
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - Assets/playstore.png
    - Assets/app_logo.svg
    - Assets/splash_bg.png
    - Assets/surveycam_logo.svg
    - Assets/App_logo.png
    - Assets/lottie/
    - Assets/fonts/
# -------------------------------
# ✅ APP ICON CONFIG
# -------------------------------
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "Assets/App_logo.png"
  min_sdk_android: 21

