<svg width="600" height="700" viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Soft glow -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <!-- Stronger glow for badge -->
        <filter id="badgeGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <!-- Background subtle shadow -->
        <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1E3A8A" flood-opacity="0.18"/>
        </filter>

        <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#2563EB"/>
            <stop offset="100%" stop-color="#1E3A8A"/>
        </linearGradient>

        <radialGradient id="lensGlow" cx="35%" cy="35%" r="70%">
            <stop offset="0%" stop-color="#4B5563"/>
            <stop offset="100%" stop-color="#111827"/>
        </radialGradient>
    </defs>

    <!-- Background -->
    <rect width="600" height="700" fill="#FFFFFF"/>

    <g transform="translate(0,10)" filter="url(#softShadow)">

        <!-- Pin -->
        <path
            d="M300 40C220 40 160 100 160 180C160 280 300 425 300 425C300 425 440 280 440 180C440 100 380 40 300 40Z"
            fill="url(#pinGrad)"
            filter="url(#glow)"
        />

        <!-- Camera -->
        <circle cx="300" cy="180" r="95" fill="#FFFFFF" filter="url(#glow)"/>
        <circle cx="300" cy="180" r="82" fill="#374151"/>

        <!-- Lens -->
        <circle cx="300" cy="180" r="48" fill="url(#lensGlow)"/>
        <circle cx="284" cy="165" r="12" fill="#FFFFFF" opacity="0.85"/>

        <!-- Overlay box -->
        <rect
            x="348"
            y="123"
            width="78"
            height="78"
            rx="14"
            fill="#FFFFFF"
            stroke="#1E3A8A"
            stroke-width="4"
            filter="url(#glow)"
        />

        <!-- Clock (perfect center using group) -->
        <g transform="translate(387,162)">
            <!-- vertical -->
            <line x1="0" y1="0" x2="0" y2="-26" stroke="#1E3A8A" stroke-width="8" stroke-linecap="round"/>
            <!-- horizontal -->
            <line x1="0" y1="0" x2="24" y2="0" stroke="#1E3A8A" stroke-width="8" stroke-linecap="round"/>
        </g>

        <!-- Check -->
        <circle cx="430" cy="205" r="26" fill="#22C55E" filter="url(#badgeGlow)"/>
        <path d="M418 205 L426 213 L438 197"
            stroke="#FFFFFF"
            stroke-width="5"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"/>
    </g>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="1.5" />
        <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
    <!-- Text -->
    <text
        x="300"
        y="500"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="72"
        font-weight="700"
        letter-spacing="-1"
        fill="#1E3A8A"
        filter="url(#textGlow)"
    >
        Survey<tspan fill="#1D4ED8">Cam</tspan>
    </text>
</svg>